services:
  - type: web
    name: betleague
    runtime: docker
    repo: https://github.com/fernando053/betleague
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: betleague-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
        value: https://betleague.onrender.com
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production

databases:
  - name: betleague-db
    plan: free
    region: frankfurt
